<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>file viewers</title>
  <link rel="stylesheet" href="css/app.css" />
</head>

<body class="m-0 min-h-screen bg-white text-black font-sans antialiased flex items-center justify-center p-8">
  <div class="max-w-lg w-full">
    <h1 class="text-sm font-medium tracking-widest text-gray-400 uppercase mb-8">File Viewers</h1>

    <div class="flex flex-col gap-3">
      <a href="templates/pptx.html"
        class="flex items-center justify-between px-4 py-4 border border-gray-200 hover:border-black transition-colors group">
        <div>
          <div class="font-medium text-sm">Presentation</div>
          <div class="text-xs text-gray-400 mt-0.5">.pptx</div>
        </div>
        <span class="text-gray-300 group-hover:text-black transition-colors text-lg">→</span>
      </a>

      <a href="templates/xlsx.html"
        class="flex items-center justify-between px-4 py-4 border border-gray-200 hover:border-black transition-colors group">
        <div>
          <div class="font-medium text-sm">Spreadsheet</div>
          <div class="text-xs text-gray-400 mt-0.5">.xlsx · .xls · .csv — editable, highlight, download</div>
        </div>
        <span class="text-gray-300 group-hover:text-black transition-colors text-lg">→</span>
      </a>

      <a href="templates/docx.html"
        class="flex items-center justify-between px-4 py-4 border border-gray-200 hover:border-black transition-colors group">
        <div>
          <div class="font-medium text-sm">Document</div>
          <div class="text-xs text-gray-400 mt-0.5">.docx</div>
        </div>
        <span class="text-gray-300 group-hover:text-black transition-colors text-lg">→</span>
      </a>
    </div>

    <p class="text-[11px] text-gray-300 mt-8">all processing happens locally in your browser — no files are uploaded</p>
  </div>
</body>

</html>
