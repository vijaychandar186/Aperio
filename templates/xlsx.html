<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>xlsx / csv viewer</title>
  <link rel="stylesheet" href="../css/app.css" />
</head>

<body class="m-0 h-full bg-white text-black font-sans antialiased">
  <div id="app" class="flex flex-col h-screen">

    <header class="relative flex items-center gap-2 sm:gap-3 px-3 sm:px-4 py-2 sm:py-3 border-b border-gray-200 flex-wrap">
      <button id="menuBtn" aria-label="toggle sidebar"
        class="inline-flex flex-col justify-center items-center gap-1 w-8 h-7 p-0 bg-white border border-gray-300 hover:border-black cursor-pointer shrink-0">
        <span class="block w-4 h-0.5 bg-black"></span>
        <span class="block w-4 h-0.5 bg-black"></span>
        <span class="block w-4 h-0.5 bg-black"></span>
      </button>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv"
        class="text-xs sm:text-sm text-black min-w-0 max-w-[160px] sm:max-w-none" />
      <span id="status" class="text-xs text-gray-500 ml-auto truncate max-w-[40%]">no file loaded</span>
    </header>

    <!-- editing toolbar -->
    <div id="toolbar" class="flex items-center gap-2 px-3 py-1.5 border-b border-gray-100 bg-gray-50 flex-wrap">
      <span class="text-[10px] tracking-widest text-gray-400 uppercase select-none">Highlight</span>
      <div id="swatches" class="flex items-center gap-1"></div>
      <button id="clearHighlight"
        class="text-[11px] text-gray-500 border border-gray-300 hover:border-black px-2 py-0.5 bg-white cursor-pointer">clear</button>
      <span class="w-px h-4 bg-gray-200 mx-1"></span>
      <span id="cellRef" class="text-[11px] font-mono text-gray-400 min-w-[28px]"></span>
      <span id="saveIndicator" class="text-[11px] text-gray-300 ml-1"></span>
      <button id="downloadBtn"
        class="ml-auto text-xs border border-gray-300 hover:border-black px-2.5 py-1 bg-white cursor-pointer">download .xlsx</button>
    </div>

    <main class="flex flex-1 min-h-0 relative">
      <aside id="sidebar" data-collapsed="false"
        class="absolute md:relative inset-y-0 left-0 z-20 w-56 bg-white border-r border-gray-200 overflow-y-auto flex flex-col transition-all duration-200 ease-in-out
               data-[collapsed=true]:-translate-x-full
               md:data-[collapsed=true]:translate-x-0
               md:data-[collapsed=true]:w-0
               md:data-[collapsed=true]:border-r-0
               md:data-[collapsed=true]:overflow-hidden">
        <div class="p-2 border-b border-gray-200">
          <div class="text-[10px] tracking-widest text-gray-400 uppercase mb-1.5 px-0.5">Library</div>
          <div id="library">
            <div class="text-[11px] text-gray-300 italic px-0.5 py-1">no saved files</div>
          </div>
        </div>
        <div class="p-2 flex-1">
          <div class="text-[10px] tracking-widest text-gray-400 uppercase mb-1.5 px-0.5">Sheets</div>
          <div id="sheetList">
            <div class="text-[11px] text-gray-300 italic px-0.5 py-1">no file loaded</div>
          </div>
        </div>
      </aside>

      <section id="stage" class="flex-1 overflow-hidden bg-gray-100">
        <div class="text-gray-400 p-10 text-center">pick a .xlsx or .csv file to render</div>
      </section>
    </main>
  </div>

  <script src="../js/lib/xlsx.full.min.js"></script>
  <script src="../js/shared/FileDatabase.js"></script>
  <script src="../js/shared/SidebarNav.js"></script>
  <script src="../js/xlsx/SelectionManager.js"></script>
  <script src="../js/xlsx/HighlightManager.js"></script>
  <script src="../js/xlsx/TableRenderer.js"></script>
  <script src="../js/xlsx/CellEditor.js"></script>
  <script src="../js/xlsx/AutoSave.js"></script>
  <script src="../js/xlsx/XlsxApp.js"></script>
</body>

</html>
